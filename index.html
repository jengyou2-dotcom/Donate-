<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Donation System</title>
</head>
<body>

<!-- (UI trimmed for brevity — keep your original HTML UI here unchanged) -->

<script>
// CONFIG
const JBIN = 'https://api.jsonbin.io/v3/b';
const JBIN_KEY = '$2a$10$Kz2mznm8rZktsakdVWFfn.Cl0Hbu3QNEfyBj2YpFElKJ7XMEnV/NS'; // PUT YOUR KEY

const POLL = 3000;

let binId = null;
let lastSeq = 0; // 👈 ADD THIS LINE
let mode, room;

let modeUI = "chat"; // "chat" or "overlay"

const SP = new URLSearchParams(location.search);
mode = SP.get('m');
room = SP.get('r');
binId = SP.get('b');

// ───── START ─────
if (!mode) {
  document.body.innerHTML = `
    <h2>Fake Donation</h2>
    <button onclick="hostClick()">Host</button>
    <button onclick="guestClick()">Join</button>
  `;
} else {
  boot();
}

// ───── BOOT ─────
async function boot() {
  try {
    if (!binId) {
      const res = await fetch(JBIN, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JBIN_KEY,
          'X-Bin-Private': 'false'
        },
        body: JSON.stringify({
          record: { seq: 0, donations: [] }
        })
      });

      if (!res.ok) throw new Error(await res.text());

      const data = await res.json();
      binId = data.metadata.id;

      const u = new URL(location.href);
      u.searchParams.set('b', binId);
      history.replaceState(null, '', u.toString());
    }

    if (mode === 'host') enterHost();
    else enterCtrl();

  } catch (e) {
    console.error(e);
    alert("Connection failed: " + e.message);
  }
}

// ───── SAFE GET RECORD ─────
async function getRecord() {
  const res = await fetch(JBIN + '/' + binId + '/latest', {
    headers: { 'X-Master-Key': JBIN_KEY },
    cache: 'no-store'
  });

  const data = await res.json();
  const rec = data.record || {};

  return {
    seq: typeof rec.seq === "number" ? rec.seq : 0,
    donations: Array.isArray(rec.donations) ? rec.donations : []
  };
}

// ───── HOST ─────
function enterHost() {
  document.body.innerHTML = `
    <h2>OBS Overlay Running...</h2>
    <button onclick="toggleMode()">🔄 Switch Mode</button>
    <button onclick="enableAudio()">🔊 Enable Sound</button>
    <div id="chatBox"></div>
    <div id="overlayBox"></div>
  `;

  setInterval(poll, POLL);
}

function toggleMode() {
  modeUI = modeUI === "chat" ? "overlay" : "chat";
  alert("Mode: " + modeUI);
}  

async function poll() {
  try {
    const rec = await getRecord();

    const newDons = rec.donations.filter(d => d.seq > lastSeq);

    if (newDons.length) {
      lastSeq = Math.max(...newDons.map(d => d.seq));
      newDons.forEach(showAlert);
    }

  } catch (e) {
    console.error("Poll error:", e);
  }
}

// ───── CONTROLLER ─────
function enterCtrl() {
  document.body.innerHTML = `
  <h2>Send Donation</h2>
  <input id="name" placeholder="Name"><br><br>
  <input id="amt" type="number" placeholder="Amount"><br><br>
  <input id="msg" placeholder="Message (optional)"><br><br>
  <button onclick="fire()">Send</button>
`;
}

async function fire() {
 const payload = {
  name: document.getElementById('name').value || 'Anon',
  amt: parseFloat(document.getElementById('amt').value) || 5,
  msg: document.getElementById('msg').value || '',
  cur: '$',
  color: '#1D9E75',
  ts: Date.now()
};

  try {
    const rec = await getRecord();

    const newSeq = rec.seq + 1;
    payload.seq = newSeq;

    const newDons = [...rec.donations, payload];

    const res = await fetch(JBIN + '/' + binId, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JBIN_KEY
      },
     body: JSON.stringify({
  seq: newSeq,
  donations: newDons
})
    });

    if (!res.ok) throw new Error(await res.text());

    alert("Donation sent!");

  } catch (e) {
    console.error(e);
    alert("Failed: " + e.message);
  }
}
// --spech
function speakDonation(d) {
  const text = d.msg
    ? `${d.name} โดเนท ${d.amt} บาท... ${d.msg}`
    : `${d.name} โดเนท ${d.amt} บาท`;

  const utter = new SpeechSynthesisUtterance(text);

  utter.lang = "th-TH";   // 🔥 IMPORTANT
  utter.rate = 1;
  utter.pitch = 1;
  utter.volume = 1;

  const voices = speechSynthesis.getVoices();

  // try to find Thai voice
  const thaiVoice = voices.find(v => v.lang === "th-TH");

  if (thaiVoice) {
    utter.voice = thaiVoice;
  }

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}
// ───── ALERT ─────
function showAlert(d) {
  if (modeUI === "chat") {
    const el = document.createElement('div');

    el.innerHTML = `
      <div style="margin-bottom:10px;">
        <b>${d.name}</b> donated ${d.cur}${d.amt}<br>
        <span style="color:gray;">${d.msg || ""}</span>
      </div>
    `;

    document.getElementById("chatBox").prepend(el);
  }

  if (modeUI === "overlay") {
    showOverlay(d);
  }

  speakDonation(d);
}
//-- overlay

function showOverlay(d) {
  const box = document.getElementById("overlayBox");

  const el = document.createElement("div");
  el.style.position = "fixed";
  el.style.bottom = "100px";
  el.style.left = "50px";
  el.style.background = "rgba(0,0,0,0.8)";
  el.style.color = "white";
  el.style.padding = "20px";
  el.style.borderRadius = "10px";
  el.style.fontSize = "20px";
  el.style.opacity = "0";
  el.style.transition = "opacity 0.5s";

  el.innerHTML = `
    <img src="gifs/donate.gif" width="80">
    <b>${d.name}</b> donated ${d.cur}${d.amt}<br>
    ${d.msg || ""}
  `;

  box.appendChild(el);

  // fade in
  setTimeout(() => {
    el.style.opacity = "1";
  }, 50);

  // fade out
  setTimeout(() => {
    el.style.opacity = "0";
    setTimeout(() => el.remove(), 500);
  }, 5000);
}

// ───── NAV ─────
function hostClick() {
  const r = Math.random().toString(36).slice(2,8);
  const u = new URL(location.href);
  u.searchParams.set('m','host');
  u.searchParams.set('r',r);
  u.searchParams.delete('b'); // 🔥 force new clean bin
  location.href = u.toString();
}

function guestClick() {
  const raw = prompt('Paste controller link:');
  if (!raw) return;
  const u = new URL(raw);
  u.searchParams.set('m','ctrl');
  location.href = u.toString();
}
</script>
  
</body>
</html>

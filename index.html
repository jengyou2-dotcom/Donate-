<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Donation System</title>
</head>
<body>

<!-- (UI trimmed for brevity — keep your original HTML UI here unchanged) -->

<script>
// CONFIG
const JBIN = 'https://api.jsonbin.io/v3/b';
const JBIN_KEY = '$2a$10$Kz2mznm8rZktsakdVWFfn.Cl0Hbu3QNEfyBj2YpFElKJ7XMEnV/NS'; // PUT YOUR KEY

const POLL = 3000;

let binId = null;
let lastSeq = 0; // 👈 ADD THIS LINE
let mode, room;

const SP = new URLSearchParams(location.search);
mode = SP.get('m');
room = SP.get('r');
binId = SP.get('b');

// ───── START ─────
if (!mode) {
  document.body.innerHTML = `
    <h2>Fake Donation</h2>
    <button onclick="hostClick()">Host</button>
    <button onclick="guestClick()">Join</button>
  `;
} else {
  boot();
}

// ───── BOOT ─────
async function boot() {
  try {
    if (!binId) {
      const res = await fetch(JBIN, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JBIN_KEY,
          'X-Bin-Private': 'false'
        },
        body: JSON.stringify({
          record: { seq: 0, donations: [] }
        })
      });

      if (!res.ok) throw new Error(await res.text());

      const data = await res.json();
      binId = data.metadata.id;

      const u = new URL(location.href);
      u.searchParams.set('b', binId);
      history.replaceState(null, '', u.toString());
    }

    if (mode === 'host') enterHost();
    else enterCtrl();

  } catch (e) {
    console.error(e);
    alert("Connection failed: " + e.message);
  }
}

// ───── SAFE GET RECORD ─────
async function getRecord() {
  const res = await fetch(JBIN + '/' + binId + '/latest', {
    headers: { 'X-Master-Key': JBIN_KEY },
    cache: 'no-store'
  });

  const data = await res.json();
  const rec = data.record || {};

  return {
    seq: typeof rec.seq === "number" ? rec.seq : 0,
    donations: Array.isArray(rec.donations) ? rec.donations : []
  };
}

// ───── HOST ─────
function enterHost() {
  document.body.innerHTML = "<h2>OBS Overlay Running...</h2>";
  setInterval(poll, POLL);
}

async function poll() {
  try {
    const rec = await getRecord();

    const newDons = rec.donations.filter(d => d.seq > lastSeq);

    if (newDons.length) {
      lastSeq = Math.max(...newDons.map(d => d.seq));
      newDons.forEach(showAlert);
    }

  } catch (e) {
    console.error("Poll error:", e);
  }
}

// ───── CONTROLLER ─────
function enterCtrl() {
  document.body.innerHTML = `
  <h2>Send Donation</h2>
  <input id="name" placeholder="Name"><br><br>
  <input id="amt" type="number" placeholder="Amount"><br><br>
  <input id="msg" placeholder="Message (optional)"><br><br>
  <button onclick="fire()">Send</button>
`;
}

async function fire() {
 const payload = {
  name: document.getElementById('name').value || 'Anon',
  amt: parseFloat(document.getElementById('amt').value) || 5,
  msg: document.getElementById('msg').value || '',
  cur: '$',
  color: '#1D9E75',
  ts: Date.now()
};

  try {
    const rec = await getRecord();

    const newSeq = rec.seq + 1;
    payload.seq = newSeq;

    const newDons = [...rec.donations, payload];

    const res = await fetch(JBIN + '/' + binId, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JBIN_KEY
      },
     body: JSON.stringify({
  seq: newSeq,
  donations: newDons
})
    });

    if (!res.ok) throw new Error(await res.text());

    alert("Donation sent!");

  } catch (e) {
    console.error(e);
    alert("Failed: " + e.message);
  }
}
// --spech
 function speakDonation(d) {
  const text = d.msg
    ? `${d.name} donated ${d.cur}${d.amt}. ${d.msg}`
    : `${d.name} donated ${d.cur}${d.amt}`;

  const utter = new SpeechSynthesisUtterance(text);

  // voice settings
  utter.rate = 1;
  utter.pitch = 2; // keep it natural (3 is too high)
  utter.volume = 1;

  const voices = speechSynthesis.getVoices();
  if (voices.length > 0) {
    utter.voice = voices.find(v => v.lang.includes("en")) || voices[0];
  }

  speechSynthesis.cancel(); // prevent overlap
  speechSynthesis.speak(utter);
}
// ───── ALERT ─────
function showAlert(d) {
  const el = document.createElement('div');

  el.innerHTML = `
    <div style="font-size:20px;font-weight:bold;">
      ${d.name} donated ${d.cur}${d.amt}
    </div>
    <div style="font-size:14px;color:gray;">
      ${d.msg || ""}
    </div>
  `;

  document.body.prepend(el);

  // 🔥 ADD THIS LINE
  speakDonation(d);
}

// ───── NAV ─────
function hostClick() {
  const r = Math.random().toString(36).slice(2,8);
  const u = new URL(location.href);
  u.searchParams.set('m','host');
  u.searchParams.set('r',r);
  u.searchParams.delete('b'); // 🔥 force new clean bin
  location.href = u.toString();
}

function guestClick() {
  const raw = prompt('Paste controller link:');
  if (!raw) return;
  const u = new URL(raw);
  u.searchParams.set('m','ctrl');
  location.href = u.toString();
}
</script>
  
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Donation System</title>
</head>
<body>

<!-- (UI trimmed for brevity — keep your original HTML UI here unchanged) -->

<script>
// ✅ CONFIG
const JBIN = 'https://api.jsonbin.io/v3/b';
const JBIN_KEY = '$2a$10$Kz2mznm8rZktsakdVWFfn.Cl0Hbu3QNEfyBj2YpFElKJ7XMEnV/NS'; // 🔥 PUT YOUR KEY HERE

const POLL = 3000;
const SHOW = 7000;

let binId = null, lastSeq = 0;
let queue = [], busy = false;
let mode, room;

const SP = new URLSearchParams(location.search);
mode = SP.get('m');
room = SP.get('r');
binId = SP.get('b');

// ───────────── BOOT ─────────────
if (!mode) {
  document.body.innerHTML = `
    <h2>Fake Donation</h2>
    <button onclick="hostClick()">Host</button>
    <button onclick="guestClick()">Join</button>
  `;
} else {
  boot();
}

async function boot() {
  try {
    if (!binId) {
      const res = await fetch(JBIN, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JBIN_KEY,
          'X-Bin-Private': 'false'
        },
        body: JSON.stringify({
          record: { seq: 0, donations: [] }
        })
      });

      if (!res.ok) throw new Error(await res.text());

      const d = await res.json();
      binId = d.metadata.id;

      const u = new URL(location.href);
      u.searchParams.set('b', binId);
      history.replaceState(null, '', u.toString());
    }

    if (mode === 'host') enterHost();
    else enterCtrl();

  } catch (e) {
    console.error(e);
    alert("Connection failed: " + e.message);
  }
}

// ───────────── HOST (OBS) ─────────────
function enterHost() {
  document.body.innerHTML = "<h2>OBS Overlay Running...</h2>";
  setInterval(poll, POLL);
}

async function poll() {
  try {
    const res = await fetch(JBIN + '/' + binId + '/latest', {
      headers: { 'X-Master-Key': JBIN_KEY },
      cache: 'no-store'
    });

    if (!res.ok) return;

    const d = await res.json();
    const rec = d.record || { seq: 0, donations: [] };

    const newDons = rec.donations.filter(x => x.seq > lastSeq);

    if (newDons.length) {
      lastSeq = Math.max(...newDons.map(x => x.seq));
      newDons.forEach(showAlert);
    }

  } catch (e) {
    console.error(e);
  }
}

// ───────────── CONTROLLER ─────────────
function enterCtrl() {
  document.body.innerHTML = `
    <h2>Send Donation</h2>
    <input id="name" placeholder="Name"><br><br>
    <input id="amt" type="number" placeholder="Amount"><br><br>
    <button onclick="fire()">Send</button>
  `;
}

async function fire() {
  const payload = {
    name: document.getElementById('name').value || 'Anon',
    amt: parseFloat(document.getElementById('amt').value) || 5,
    cur: '$',
    msg: '',
    color: '#1D9E75',
    ts: Date.now()
  };

  try {
    // GET
    const gr = await fetch(JBIN + '/' + binId + '/latest', {
      headers: { 'X-Master-Key': JBIN_KEY },
      cache: 'no-store'
    });

    const gd = await gr.json();
    const rec = gd.record || { seq: 0, donations: [] };

    const newSeq = rec.seq + 1;
    payload.seq = newSeq;

    const newDons = [...rec.donations, payload];

    // PUT
    const pr = await fetch(JBIN + '/' + binId, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JBIN_KEY
      },
      body: JSON.stringify({
        record: {
          seq: newSeq,
          donations: newDons
        }
      })
    });

    if (!pr.ok) throw new Error(await pr.text());

    alert("Donation sent!");

  } catch (e) {
    console.error(e);
    alert("Failed: " + e.message);
  }
}

// ───────────── ALERT ─────────────
function showAlert(d) {
  const div = document.createElement('div');
  div.innerHTML = `<h3>${d.name} donated ${d.cur}${d.amt}</h3>`;
  document.body.appendChild(div);
}

// ───────────── LANDING ─────────────
function hostClick() {
  const r = Math.random().toString(36).slice(2,8);
  const u = new URL(location.href);
  u.searchParams.set('m','host');
  u.searchParams.set('r',r);
  location.href = u.toString();
}

function guestClick() {
  const raw = prompt('Paste controller link:');
  if (!raw) return;
  const u = new URL(raw);
  u.searchParams.set('m','ctrl');
  location.href = u.toString();
}
</script>

</body>
</html>
